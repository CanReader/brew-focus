  <path d="M250 198 C250 178, 263 171, 263 151 C263 131, 250 124, 250 104" fill="none" stroke="#F5E6D3" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M295 205 C295 185, 308 178, 308 158 C308 138, 295 131, 295 111" fill="none" stroke="#F5E6D3" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- Focus crosshair on coffee surface -->
