  <line x1="250" y1="216" x2="250" y2="260" stroke="#2C1A12" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="200" y1="238" x2="300" y2="238" stroke="#2C1A12" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
