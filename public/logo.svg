  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="244" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#6F4E37" stroke-width="3" opacity="0.4"/>

