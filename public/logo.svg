      <stop offset="100%" stop-color="#6F4E37"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#1B0F0A"/>
